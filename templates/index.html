<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Classifier - AI Vision</title>
    <!-- Modern Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS for grid and utilities out of the box -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-vh-100 d-flex align-items-center py-5">
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10 py-5 px-sm-5 px-4 glass-panel rounded-4">
                
                <!-- Header Section -->
                <div class="text-center mb-5">
                    <div class="d-flex justify-content-center align-items-center mb-3">
                        <i class="bi bi-robot fs-1 me-3 icon-glow text-info"></i>
                        <h1 class="display-5 fw-bold mb-0 bg-transparent text-white">Pet Vision AI</h1>
                    </div>
                    <p class="lead text-light opacity-75">Upload a photo to predict whether it's a cat or a dog using our deep learning model.</p>
                </div>
                
                <!-- Upload Section -->
                <div id="uploadSection" class="upload-area rounded-4 p-5 text-center mb-4 position-relative" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" class="d-none" accept="image/*">
                    <i class="bi bi-cloud-arrow-up display-3 text-info icon-glow mb-3 d-block"></i>
                    <h3 class="fw-semibold text-white">Drag & Drop Image</h3>
                    <p class="text-secondary mb-0">or click to browse files</p>
                </div>

                <!-- Preview Section (Hidden by default) -->
                <div id="previewSection" class="d-none text-center mb-4 fade-in">
                    <div class="position-relative d-inline-block">
                        <img id="imagePreview" src="" alt="Preview" class="img-fluid mb-3">
                        <button type="button" class="btn btn-sm btn-danger position-absolute top-0 end-0 m-2 rounded-circle" onclick="clearSelection()" title="Remove Image" style="width: 32px; height: 32px;">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    
                    <div class="d-grid gap-2 col-md-8 mx-auto mt-3">
                        <button id="predictBtn" class="btn custom-btn py-3 fs-5 rounded-pill shadow" onclick="uploadAndPredict()">
                            <i class="bi bi-magic me-2"></i> Predict Now
                        </button>
                    </div>
                </div>

                <!-- Results Section (Hidden by default) -->
                <div id="resultSection" class="d-none fade-in">
                    <div class="result-card p-4 rounded-4 mt-4 text-center">
                        <h4 class="text-light mb-4">Analysis Results</h4>
                        
                        <div class="d-flex justify-content-between align-items-center mb-2 px-1">
                            <span id="predictedClass" class="fs-4 fw-bold text-info">--</span>
                            <span id="confidenceText" class="fs-5 text-white">--%</span>
                        </div>
                        
                        <div class="progress mb-3 shadow">
                            <div id="confidenceBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                        
                        <p id="resultMessage" class="text-light opacity-75 mt-3 mb-0"></p>
                    </div>
                    
                    <div class="text-center mt-4">
                        <button class="btn btn-outline-light rounded-pill px-4" onclick="resetForm()">
                            <i class="bi bi-arrow-counterclockwise me-2"></i> Try Another Image
                        </button>
                    </div>
                </div>

                <!-- Error Message Alert -->
                <div id="errorAlert" class="alert alert-danger d-none mt-4 text-center shadow" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span id="errorMessage">An error occurred.</span>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
